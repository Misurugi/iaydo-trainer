<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Изучение — Иайдо</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <div class="page-header">
    <a href="index.html" class="back-btn">←</a>
    <h1>Изучение материала</h1>
  </div>

  <!-- ── SETUP ── -->
  <div id="setup">
    <div class="card">
      <h2>Кю-ранг</h2>
      <div class="level-grid" style="grid-template-columns: repeat(6,1fr)">
        <button class="level-btn" data-level="0" onclick="selectLevel(0)">Все</button>
        <button class="level-btn" data-level="5" onclick="selectLevel(5)">5</button>
        <button class="level-btn" data-level="4" onclick="selectLevel(4)">4</button>
        <button class="level-btn" data-level="3" onclick="selectLevel(3)">3</button>
        <button class="level-btn" data-level="2" onclick="selectLevel(2)">2</button>
        <button class="level-btn" data-level="1" onclick="selectLevel(1)">1</button>
      </div>
      <div id="levelInfo" class="note" style="min-height:20px;margin-top:10px"></div>
    </div>

    <div class="card">
      <h2>Направление</h2>
      <div class="flex-gap" style="gap:18px">
        <label style="cursor:pointer;display:flex;gap:6px;align-items:center">
          <input type="radio" name="dir" value="term_to_def" checked>
          <span>Термин → Определение</span>
        </label>
        <label style="cursor:pointer;display:flex;gap:6px;align-items:center">
          <input type="radio" name="dir" value="def_to_term">
          <span>Определение → Термин</span>
        </label>
        <label style="cursor:pointer;display:flex;gap:6px;align-items:center">
          <input type="radio" name="dir" value="random">
          <span>Случайно</span>
        </label>
      </div>
    </div>

    <div class="card" id="orderCard">
      <h2>Порядок</h2>
      <div class="flex-gap" style="gap:18px">
        <label style="cursor:pointer;display:flex;gap:6px;align-items:center">
          <input type="radio" name="order" value="sequential" checked>
          <span>По порядку</span>
        </label>
        <label style="cursor:pointer;display:flex;gap:6px;align-items:center">
          <input type="radio" name="order" value="shuffle">
          <span>Перемешать</span>
        </label>
      </div>
    </div>

    <div class="text-center mt-16" id="startRow" style="display:none">
      <button class="btn btn-primary" style="padding:12px 40px" onclick="startStudy()">Начать изучение</button>
    </div>
  </div>

  <!-- ── STUDY ── -->
  <div id="study" class="hidden">

    <div class="study-stats">
      <span>Карточка: <b id="studyCounter">1 / 27</b></span>
      <span class="stat-know">✓ Знаю: <b id="knowCount">0</b></span>
      <span class="stat-repeat">↺ Повторить: <b id="repeatCount">0</b></span>
    </div>

    <div class="progress-wrap"><div class="progress-bar" id="studyProgress" style="width:0%"></div></div>

    <div class="study-nav">
      <button class="btn btn-ghost" style="padding:8px 16px" onclick="prevCard()">← Пред</button>
      <span id="cardLevelBadge" style="font-size:0.8rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase"></span>
      <button class="btn btn-ghost" style="padding:8px 16px" onclick="nextCard()">След →</button>
    </div>

    <!-- Flashcard -->
    <div class="flashcard-wrap" onclick="flipCard()" id="cardWrap">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-face front">
          <div class="card-term" id="cardFront"></div>
          <div class="card-hint">нажми чтобы узнать ответ</div>
        </div>
        <div class="flashcard-face back">
          <div class="card-def" id="cardBack"></div>
        </div>
      </div>
    </div>

    <div class="study-actions">
      <button class="btn btn-ghost" onclick="markRepeat()">↺ Повторить</button>
      <button class="btn btn-success" onclick="markKnow()">✓ Знаю</button>
    </div>

    <div class="text-center mt-24" id="studyFinishRow" style="display:none">
      <button class="btn btn-outline" onclick="repeatUnknown()" id="btnRepeatWeak">Повторить слабые</button>
      <button class="btn btn-ghost" onclick="backToSetup()" style="margin-left:8px">← Настройки</button>
    </div>
  </div>

  <!-- ── RESULTS ── -->
  <div id="results" class="hidden">
    <div class="card" style="text-align:center">
      <div class="score-big" id="resultScore"></div>
      <div class="score-sub" id="resultSub"></div>
    </div>

    <div id="repeatSection">
      <div class="card">
        <h3>На повторение:</h3>
        <ul class="review-list" id="repeatList"></ul>
      </div>
    </div>

    <div class="flex-gap mt-16" style="justify-content:center">
      <button class="btn btn-primary" onclick="repeatUnknown()" id="btnRepeatAll">Повторить слабые</button>
      <button class="btn btn-outline" onclick="backToSetup()">Другой кю-ранг</button>
    </div>
  </div>

</div>
<script>
let allCards = [];
let deck     = [];
let idx      = 0;
let known    = new Set();
let toRepeat = new Set();
let flipped  = false;
let dir      = 'term_to_def';
let selectedLevel = null;

// ── Load data ──
fetch('/data/questions.json')
  .then(r => r.json())
  .then(data => { allCards = data; })
  .catch(() => { allCards = []; alert('Не удалось загрузить карточки'); });

// ── Setup ──
function selectLevel(lvl) {
  selectedLevel = lvl;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.level-btn[data-level="${lvl}"]`).classList.add('active');

  const filtered = lvl === 0 ? allCards : allCards.filter(c => c.level === lvl);
  const counts = {};
  filtered.forEach(c => { counts[c.level] = (counts[c.level] || 0) + 1; });
  const breakdown = Object.entries(counts).sort((a,b)=>b[0]-a[0])
    .map(([l,n]) => `${l} кю: ${n}`).join(' · ');
  document.getElementById('levelInfo').textContent =
    `${filtered.length} карточек` + (breakdown ? ` (${breakdown})` : '');
  document.getElementById('startRow').style.display = filtered.length ? '' : 'none';
}

function startStudy() {
  dir = document.querySelector('input[name=dir]:checked').value;
  const order = document.querySelector('input[name=order]:checked').value;

  const filtered = selectedLevel === 0
    ? [...allCards]
    : allCards.filter(c => c.level === selectedLevel);

  deck = order === 'shuffle' ? shuffle([...filtered]) : [...filtered];
  idx = 0;
  known.clear();
  toRepeat.clear();

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');
  document.getElementById('study').classList.remove('hidden');
  document.getElementById('studyFinishRow').style.display = 'none';

  showCard();
}

// ── Cards ──
function showCard() {
  if (idx >= deck.length) { showResults(); return; }

  const card = deck[idx];
  const cardDir = dir === 'random'
    ? (Math.random() < 0.5 ? 'term_to_def' : 'def_to_term')
    : dir;

  const front = cardDir === 'term_to_def' ? card.term : card.definition;
  const back  = cardDir === 'term_to_def' ? card.definition : card.term;

  document.getElementById('cardFront').textContent = front;
  document.getElementById('cardBack').textContent  = back;
  document.getElementById('cardLevelBadge').textContent = `${card.level} кю`;

  // reset flip
  flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');

  // progress
  const total = deck.length;
  const done  = known.size + toRepeat.size;
  document.getElementById('studyProgress').style.width = (done / total * 100) + '%';
  document.getElementById('studyCounter').textContent  = (idx + 1) + ' / ' + total;
  document.getElementById('knowCount').textContent     = known.size;
  document.getElementById('repeatCount').textContent   = toRepeat.size;

  // show finish row when on last card
  if (idx === deck.length - 1) {
    document.getElementById('studyFinishRow').style.display = '';
    const hasRepeat = toRepeat.size > 0;
    document.getElementById('btnRepeatWeak').disabled = !hasRepeat;
  }
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('flashcard').classList.toggle('flipped', flipped);
}

function prevCard() {
  if (idx > 0) { idx--; showCard(); }
}

function nextCard() {
  if (idx < deck.length - 1) { idx++; showCard(); }
  else showResults();
}

function markKnow() {
  known.add(idx);
  toRepeat.delete(idx);
  if (idx < deck.length - 1) { idx++; showCard(); }
  else showResults();
}

function markRepeat() {
  toRepeat.add(idx);
  known.delete(idx);
  if (idx < deck.length - 1) { idx++; showCard(); }
  else showResults();
}

// ── Results ──
function showResults() {
  document.getElementById('study').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');

  const total   = deck.length;
  const knowN   = known.size;
  const repeatN = toRepeat.size;
  const unmarked = total - knowN - repeatN;

  document.getElementById('resultScore').textContent = `${knowN} / ${total}`;
  document.getElementById('resultSub').textContent =
    `Знаю: ${knowN} · Повторить: ${repeatN}` + (unmarked ? ` · Без отметки: ${unmarked}` : '');

  const list = document.getElementById('repeatList');
  list.innerHTML = '';
  const repeatCards = deck.filter((_, i) => toRepeat.has(i));
  document.getElementById('repeatSection').style.display = repeatCards.length ? '' : 'none';
  document.getElementById('btnRepeatAll').disabled = repeatCards.length === 0;

  repeatCards.forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `<div class="r-term">${c.term}</div><div class="r-def">${c.definition}</div>`;
    list.appendChild(li);
  });
}

function repeatUnknown() {
  const repeatCards = deck.filter((_, i) => toRepeat.has(i));
  if (!repeatCards.length) return;
  const order = document.querySelector('input[name=order]:checked').value;
  deck = order === 'shuffle' ? shuffle([...repeatCards]) : [...repeatCards];
  idx = 0;
  known.clear();
  toRepeat.clear();

  document.getElementById('results').classList.add('hidden');
  document.getElementById('study').classList.remove('hidden');
  document.getElementById('studyFinishRow').style.display = 'none';
  showCard();
}

function backToSetup() {
  document.getElementById('study').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
}

// ── Util ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
</script>
</body>
</html>
